<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div>span:first-child{
            background-color: #FFFF00;
        }
        div>span:only-child{
            background-color: #00FF00;
        }
        div>span:last-child{
            background-color: #FF00FF;
        }
        div>span:hover{
            background-color: bisque;
        }
    </style>
</head>
<body>
    <h3>div 공간 분할</h3>
<div style="background-color: #FFFF00;">div 첫 번째 영역입니다.</div>
<div style="background-color: #00FF00;">div 두 번째 영역입니다.</div>
<div style="background-color: #FF00FF;">div 세 번째 영역입니다.</div>
<p/>
<h3>span 공간 분할</h3>
<div>
    <span>span 첫 번째 영역입니다.</span>
    <span>span 두 번째 영역입니다.</span>
    <span>span 세 번째 영역입니다.</span>
</div>

</body>
</html>
